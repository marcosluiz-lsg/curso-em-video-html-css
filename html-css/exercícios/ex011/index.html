<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir esse cite em vários dispositivos diferens ou simplismente aumente e diminua o tamanho do seu navegador.</p>

    <picture>
        <source media="(max-width:750px )" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width:1050px )" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="imagem flexível">

    </picture>
    <h1>Reproduzindo áudios</h1>
    <p>vamos aprender a reproduzir áudios em HTML5</p>
    <audio preload="metadata" autoplay controls loop>
        <source src="audios/guanacast-33.mp3" type="audio/mpeg"></audio>
        <p>Se o áudio não for compativel com seu navegador <a href="audios/guanacast-33.mp3" target="_blank" rel="external"> Clique aqui para baixar.</a></p>
     <!-- para ter compatibilidade com todos os navegadores tem que ser MP3,WAV, OGG-->
    <h1>Reproduzindo Videos</h1> 

</body>
</html>
