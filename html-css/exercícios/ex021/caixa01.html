<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixas</title>
    <style>
        h1{ /* box-level*/
            background-color: lightgrey;
            height: 300px;
            width: 300px;
            
            border: 10px solid aqua;

            padding: 10px;

            margin: 20px auto 40px auto;

            outline: 5px dashed rgb(51, 51, 51);

           
        
        }
        a{ /* inline-level */
            border-width: 10px;
            border-style:solid;
            border-color: green;

            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
        
        }
        #centralizar{
            text-align: center;
            text-decoration: underline;
            color: rgb(255, 127, 127);
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa Box-level</h1>
    <p>Parágrafos também são modelos de box-level, mas os <a href="#">links são exemplos de inline-level</a>. Vamos ver como tudo isso funciona.</p>
    <p id="centralizar">aprendendo centralizar</p>
</body>
</html>
